<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Workout Levels - YogaPathshala</title>
    <style>
        .card {
            cursor: pointer;
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }
        
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 25px rgba(0,0,0,0.15);
        }
        
        .btn-start {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            margin-top: 10px;
            transition: all 0.3s ease;
        }
        
        .btn-start:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
    </style>
</head>
<body>

<nav>
    <div class="logo">🧘 YogaPathshala</div>
    <ul>
        <li><a href="/dashboard">Dashboard</a></li>
        <li><a href="/logout">Logout</a></li>
    </ul>
</nav>

<div class="cards">
    <div class="card" onclick="window.location.href='/practice/easy'">
        <h3>🟢 Easy</h3>
        <p>Mountain Pose + Tree Pose</p>
        <p style="font-size: 12px; margin-top: 10px; color: #aaa;">Duration: 15 min</p>
        <button class="btn-start">Start Easy</button>
    </div>
    <div class="card" onclick="window.location.href='/practice/medium'">
        <h3>🟡 Medium</h3>
        <p>Downward Dog + Triangle Pose</p>
        <p style="font-size: 12px; margin-top: 10px; color: #aaa;">Duration: 30 min</p>
        <button class="btn-start">Start Medium</button>
    </div>
    <div class="card" onclick="window.location.href='/practice/difficult'">
        <h3>🔴 Difficult</h3>
        <p>Warrior II + Chair Pose + Plank</p>
        <p style="font-size: 12px; margin-top: 10px; color: #aaa;">Duration: 45 min</p>
        <button class="btn-start">Start Difficult</button>
    </div>
</div>

</body>
</html>
